name:  CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:${IMAGE_TAG}" .

      - name: Test container
        run: |
          docker run -d -p 8080:5000 "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:${IMAGE_TAG}"
          sleep 5
          curl -f http://localhost:8080

      - name: Tag image as latest
        run: |
           docker tag "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:${IMAGE_TAG}" \
                      "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:latest"

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:${IMAGE_TAG}"
          docker push "${{ secrets.DOCKER_USERNAME }}/devops-ci-lab:latest"
  
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Apply Kubernetes manifest
        run: kubectl apply -f deployment.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/devops-ci-lab \
            devops-ci-lab="${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Wait for rollout
        run: kubectl rollout status deployment/devops-ci-lab

      - name: Verify deployed image
        run: |
          kubectl get deployment devops-ci-lab -o jsonpath="{.spec.template.spec.containers[0].image}"
          echo