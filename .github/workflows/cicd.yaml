name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/devops-ci-lab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Test container
        run: |
          docker run -d --name devops-ci-lab-test -p 8080:5000 "${IMAGE_NAME}:${IMAGE_TAG}"
          sleep 5
          curl -f http://localhost:8080
          docker stop devops-ci-lab-test
          docker rm devops-ci-lab-test

      - name: Tag image as latest
        run: docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"

      - name: Push Docker images
        run: |
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${IMAGE_NAME}:latest"
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube 
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config 
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install devops-ci-lab ./helm-chart \
            --set image.repository=${IMAGE_NAME} \
            --set image.tag=${IMAGE_TAG}